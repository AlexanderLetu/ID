<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инструмент ИД</title>
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    box-sizing: border-box;
    transition: background-color 0.8s ease; 
    overflow-x: hidden;
    position: relative;
 
    background-color: #7ec0ee;
    background-image: linear-gradient(to bottom, rgba(126,192,238,0.4) 0%, rgba(236,236,236,0.4) 100%), 
                      url('https://transparenttextures.com');
    background-repeat: no-repeat, repeat-x;
    background-position: center center, 0 bottom;
    background-size: cover, auto;
    
    animation: moveCity 120s linear infinite; 
}

body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: -1;
    transition: all 0.8s ease;
    
    background: radial-gradient(circle at 10% 10%, rgba(255,255,255,0.8) 0%, transparent 40%),
                radial-gradient(circle at 25% 15%, rgba(255,255,255,0.4) 0%, transparent 20%),
                linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
    opacity: 0.9;
}

body.dark-mode {
    color: #f4f6f9;
    background-color: #0b1522; /* Более глубокий космический цвет */
    background-image: linear-gradient(to bottom, rgba(11,21,34,0.6) 0%, rgba(25,25,35,0.8) 100%), 
                      url('https://transparenttextures.com');
}

body.dark-mode::before {
    opacity: 1;
    background: radial-gradient(circle at 15% 15%, #fff 1.5px, transparent 2.5px),
                radial-gradient(circle at 45% 25%, #fff 2px, transparent 3.5px),
                radial-gradient(circle at 75% 12%, #fff 1.5px, transparent 2.5px),
                radial-gradient(circle at 30% 45%, #fff 2.5px, transparent 4px),
                radial-gradient(circle at 85% 50%, #fff 2px, transparent 3.5px),
                radial-gradient(circle at 92% 22%, #fff 1.5px, transparent 2.5px),
                radial-gradient(circle at 60% 35%, #fff 2px, transparent 3px),
                radial-gradient(circle at 8% 55%, #fff 1.5px, transparent 2.5px);
    /* Запуск магии мерцания */
    animation: twinkleStars 3s ease-in-out infinite alternate;
}

/* Эффект плавного движения панорамы города */
@keyframes moveCity {
    0% { background-position: center center, 0 bottom; }
    100% { background-position: center center, -1571px bottom; }
}

/* Эффект мерцания ночных звезд */
@keyframes twinkleStars {
    0% { opacity: 0.4; filter: drop-shadow(0 0 1px #fff); }
    100% { opacity: 1; filter: drop-shadow(0 0 4px #fff); }
}

.container {
    width: 100%;
    max-width: 800px;
    background: rgba(255, 255, 255, 0.9); 
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    backdrop-filter: blur(8px); 
    -webkit-backdrop-filter: blur(8px);
    height: fit-content;
    transition: background-color 0.5s ease;
    z-index: 1;
}

body.dark-mode .container {
    background-color: rgba(43, 43, 43, 0.88);
    box-shadow: 0 8px 32px rgba(0,0,0,0.45);
}

/* ОСТАЛЬНЫЕ СТИЛИ СТРАНИЦЫ (КНОПКИ, ТЕКСТ, ПОЛЯ) */
h2 { color: #2c3e50; margin-top: 0; text-align: center; }
.tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid #eef2f7; padding-bottom: 15px; }
.tab-btn { padding: 10px 20px; border: none; background: #eef2f7; color: #7f8c8d; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
.tab-btn.active { background: #3498db; color: white; }
.list-area { margin-bottom: 20px; }
.list-area label { display: block; font-weight: bold; margin-bottom: 8px; color: #34495e; }
textarea { width: 100%; height: 120px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; resize: vertical; box-sizing: border-box; font-family: monospace; }
.actions { display: flex; gap: 10px; margin-top: 15px; }
button.main-btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
.btn-add { background: #2ecc71; color: white; width: 100%; margin-bottom: 15px;}
.btn-add:hover { background: #27ae60; }
.btn-submit { background: #3498db; color: white; }
.btn-submit:hover { background: #2980b9; }
.btn-clear { background: #95a5a6; color: white; }
.btn-clear:hover { background: #7f8c8d; }
#results { margin-top: 25px; padding: 15px; background: #f8f9fa; border-radius: 6px; border-left: 5px solid #3498db; display: none; }

/* Двухколоночная верстка результатов */
.result-item-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed #eee; }
body.dark-mode .result-item-row { border-bottom-color: #444; }
.result-key-name { font-weight: 500; }

/* Интерактивные кнопочки-бейджи */
.store-badges-container { display: flex; gap: 6px; }
.store-badge { background: #eef2f7; color: #2c3e50; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; transition: all 0.2s; border: 1px solid #dcdde1; }
.store-badge:hover { background: #3498db; color: white; border-color: #3498db; }
body.dark-mode .store-badge { background: #3d3d3d; color: #f4f6f9; border-color: #555; }
body.dark-mode .store-badge:hover { background: #3498db; color: white; }

/* Модальное окно */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(3px); }
.modal-window { background: white; padding: 25px; border-radius: 10px; width: 90%; max-width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative; color: #333; }
body.dark-mode .modal-window { background: #2d2d2d; color: #fff; }
.modal-close { position: absolute; top: 10px; right: 15px; font-size: 22px; cursor: pointer; color: #95a5a6; }
.modal-row { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 10px 12px; border-radius: 6px; margin-bottom: 12px; font-family: monospace; font-size: 13px; border: 1px solid #eee; }
body.dark-mode .modal-row { background: #3d3d3d; border-color: #555; }
body.dark-mode .modal-row span { color: #ffffff !important; }
.copy-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 4px; transition: transform 0.1s; }
.copy-btn:active { transform: scale(0.9); }

body.dark-mode h2, body.dark-mode .list-area label, body.dark-mode #results h3 { color: #ecf0f1; }
body.dark-mode textarea { background-color: #3D3D3D; border-color: #555; color: #fff; }
body.dark-mode .tab-btn { background: #3D3D3D; color: #bdc3c7; }
body.dark-mode .tab-btn.active { background: #3498db; color: white; }
body.dark-mode #results { background: #333333; border-left-color: #3498db; }
body.dark-mode #cache-panel { background: #333333; color: #bdc3c7; }
</style>

</head>
<body>

<div class="container">
    <h2>📍 Инструмент поиска пересечений и ближайшего города</h2>
    <!-- Переключатель типов поиска -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchMode('city', this)">🏙️ Поиск по городам</button>
        <button class="tab-btn" onclick="switchMode('code', this)">🪪 Поиск по коду магазина</button>
        <button id="theme-toggle" class="tab-btn" onclick="toggleTheme()">🌙 Темная тема</button>
    </div>

    <!-- Контейнер для динамических списков -->
    <div id="lists-container">
        <div class="list-area">
            <label>Список 1</label>
            <textarea class="city-input" placeholder="Вставьте первый список строк..."></textarea>
        </div>
        <div class="list-area">
            <label>Список 2</label>
            <textarea class="city-input" placeholder="Вставьте второй список строк..."></textarea>
        </div>
    </div>

    <button class="main-btn btn-add" onclick="addNewList()">➕ Добавить список</button>

    <div class="actions">
        <button class="main-btn btn-submit" id="submit-btn" onclick="sendData()">Найти совпадения</button>
        <button class="main-btn btn-clear" onclick="clearAll()">Сбросить всё</button>
    </div>
    <!-- Плашка статуса кэша базы городов -->
    <div style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #7f8c8d; background: #eef2f7; padding: 8px 12px; border-radius: 6px;" id="cache-panel">
        <span>🟢 База городов: <strong style="color: #27ae60;">активна (кэш 6 часов)</strong></span>
        <a href="#" style="color: #2980b9; text-decoration: none; font-weight: bold;" onclick="clearServerCache(event)">🔄 Обновить базу сейчас</a>
    </div>
    <div id="results">
        <h3>Результаты пересечения (<span id="count">0</span>):</h3>
        <div id="results-list"></div>

        <!-- Новый блок поиска ближайшего города/деревни по всей РФ -->
        <div id="nearest-block" style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed #ccc;">
            <label style="font-weight: bold; display: block; margin-bottom: 8px;">📍 Найти ближайший из найденных:</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="target-city" placeholder="Введи деревню, село или город (например: село Выпуково)" style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px;">
                <button class="tab-btn" style="background: #e67e22; color: white; margin: 0;" onclick="findNearestCity()">Найти ближайший</button>
            </div>
            <div id="nearest-result" style="margin-top: 10px; font-weight: bold; color: #27ae60;"></div>
        </div>
    </div>
</div>
<div id="store-modal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-window" onclick="event.stopPropagation()">
        <span class="modal-close" onclick="closeModal(null)">&times;</span>
        <h3 style="margin-top: 0; margin-bottom: 20px; color: #3498db; border-bottom: 2px solid #3498db; padding-bottom: 8px; font-size: 18px;">📋 Карточка магазина</h3>
        
        <div style="font-size: 12px; font-weight: bold; margin-bottom: 6px; color: #7f8c8d; text-transform: uppercase; letter-spacing: 0.5px;">📍 Точный адрес отгрузки:</div>
        <div class="modal-row">
            <span id="modal-address-text" style="white-space: pre-wrap; flex: 1; padding-right: 10px; font-weight: 500; line-height: 1.4;"></span>
            <button class="copy-btn" title="Скопировать адрес" onclick="copyTextFromModal('modal-address-text', this)">📋</button>
        </div>
        
        <div style="font-size: 12px; font-weight: bold; margin-bottom: 6px; color: #7f8c8d; text-transform: uppercase; letter-spacing: 0.5px;">🪪 Код Axapta:</div>
        <div class="modal-row">
            <span id="modal-code-text" style="flex: 1; font-weight: bold; color: #2c3e50;"></span>
            <button class="copy-btn" title="Скопировать код" onclick="copyTextFromModal('modal-code-text', this)">📋</button>
        </div>
    </div>
</div>
<script>
// ==========================================
// ЧАСТЬ 1: СИСТЕМНЫЕ НАСТРОЙКИ И ИНТЕРФЕЙС
// ==========================================

let currentMode = 'city'; 
let listCount = 2;

// Переключение режимов поиска (По городам / По кодам)
function switchMode(mode, element) {
    currentMode = mode;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    element.classList.add('active');
}

// Динамическое добавление дополнительных текстовых полей
function addNewList() {
    listCount++;
    const container = document.getElementById('lists-container');
    const div = document.createElement('div');
    div.className = 'list-area';
    div.innerHTML = `
        <label>Список ${listCount}</label>
        <textarea class="city-input" placeholder="Вставьте список строк..."></textarea>
    `;
    container.appendChild(div);
}

// Плавное переключение тем оформления (День / Ночь)
function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('theme-toggle');
    body.classList.toggle('dark-mode');
    if (body.classList.contains('dark-mode')) {
        btn.innerText = '☀️ Светлая тема';
        localStorage.setItem('theme', 'dark');
    } else {
        btn.innerText = '🌙 Темная тема';
        localStorage.setItem('theme', 'light');
    }
}

// Авто-проверка темы оформления при старте страницы
window.addEventListener('DOMContentLoaded', () => {
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        const themeBtn = document.getElementById('theme-toggle');
        if (themeBtn) themeBtn.innerText = '☀️ Светлая тема';
    }
    const targetCityInput = document.getElementById('target-city');
    if (targetCityInput) targetCityInput.value = '';
});
// ==========================================
// ЧАСТЬ 2: ОТПРАВКА ДАННЫХ И ОТРИСОВКА ТОП-3
// ==========================================

function sendData() {
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerText = 'Обработка данных...';

    const textareas = document.querySelectorAll('.city-input');
    const listsData = [];

    textareas.forEach(textarea => {
        if (textarea.value.trim()) {
            listsData.push(textarea.value);
        }
    });

    if (listsData.length === 0) {
        alert('Пожалуйста, заполните хотя бы один список!');
        btn.disabled = false;
        btn.innerText = 'Найти совпадения';
        return;
    }

    // ТВОЯ АКТУАЛЬНАЯ ССЫЛКА ИЗ GOOGLE APPS SCRIPT (ЗАМЕНИ НА СВОЙ /EXEC)
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwnQJ47haye9Gz9eIWqqAzleNC9mtqmLm4K6_9S6WxGLYyT7d8bibIRQn9Lt3c_lPQk/exec';

    fetch(GAS_URL, {
        method: 'POST',
        mode: 'cors',
        body: JSON.stringify({
            action: 'processLists',
            lists: listsData,
            searchType: currentMode
        })
    })
    .then(response => response.json())
    .then(result => {
        if (result.success) {
            showResults(result.data, listsData.length);
        } else {
            alert('Ошибка сервера: ' + result.error);
            btn.disabled = false;
            btn.innerText = 'Найти совпадения';
        }
    })
    .catch(err => {
        alert('Ошибка отправки запроса: ' + err.message);
        btn.disabled = false;
        btn.innerText = 'Найти совпадения';
    });
}

function showResults(response, totalListsSent) {
    const btn = document.getElementById('submit-btn');
    btn.disabled = false;
    btn.innerText = 'Найти совпадения';

    const resultsBlock = document.getElementById('results');
    const resultsList = document.getElementById('results-list');
    const countSpan = document.getElementById('count');
    const resultsHeader = document.querySelector('#results h3');

    resultsList.innerHTML = '';
    countSpan.innerText = response.length;

    if (totalListsSent === 1) {
        if (resultsHeader) resultsHeader.innerHTML = `🏙️ Города из списка (<span id="count">${response.length}</span>):`;
    } else {
        if (resultsHeader) resultsHeader.innerHTML = `🔍 Результаты пересечения (<span id="count">${response.length}</span>):`;
    }

    if (response.length === 0) {
        resultsList.innerHTML = '<div>Данные не найдены или список пуст.</div>';
    } else {
        response.forEach(item => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'result-item-row';
            
            // Левая колонка: Имя города
            const nameSpan = document.createElement('span');
            nameSpan.className = 'result-key-name';
            nameSpan.innerText = item.displayKey;
            rowDiv.appendChild(nameSpan);

            // Правая колонка: Блок бейджей
            const badgesContainer = document.createElement('div');
            badgesContainer.className = 'store-badges-container';
            
            item.topStores.forEach(store => {
                const badge = document.createElement('button');
                badge.className = 'store-badge';
                badge.innerText = `${store.code} (${store.stock} шт)`;
                // По клику на бейдж открываем модалку с адресом
                badge.onclick = () => openModal(store.address, store.code);
                badgesContainer.appendChild(badge);
            });

            rowDiv.appendChild(badgesContainer);
            resultsList.appendChild(rowDiv);
        });
    }
    resultsBlock.style.display = 'block';
}
// ==========================================
// ЧАСТЬ 3: КАРТОЧКА, ВРЕМЯ И СБРОС ФОРМЫ
// ==========================================

// Функции управления модальным окном карточки магазина
function openModal(address, code) {
    document.getElementById('modal-address-text').innerText = address;
    document.getElementById('modal-code-text').innerText = code;
    document.getElementById('store-modal').style.display = 'flex';
}

function closeModal(event) {
    if (!event || event.target === document.getElementById('store-modal')) {
        document.getElementById('store-modal').style.display = 'none';
    }
}

// Быстрое копирование строк из карточки в буфер обмена
function copyTextFromModal(elementId, btnElement) {
    const text = document.getElementById(elementId).innerText;
    navigator.clipboard.writeText(text).then(() => {
        const originalText = btnElement.innerText;
        btnElement.innerText = '✅';
        setTimeout(() => { btnElement.innerText = originalText; }, 1500);
    });
}

// Поиск ближайшего города к деревне/селу по левой колонке результатов
function findNearestCity() {
    const inputField = document.getElementById('target-city');
    const resultDiv = document.getElementById('nearest-result');
    const inputPlace = inputField.value.trim();
    
    if (!inputPlace) {
        alert('Введите населенный пункт (деревню, село, город)!');
        return;
    }
    
    resultDiv.innerHTML = '🔍 Сервер карт Google вычисляет расстояния и время...';
    
    // Считываем только чистые имена городов из левой колонки результатов
    const foundItems = document.querySelectorAll('.result-key-name');
    let foundCities = [];
    foundItems.forEach(item => foundCities.push(item.innerText.trim()));
    
    if (foundCities.length === 0) {
        resultDiv.innerHTML = '<span style="color: #e74c3c;">Нет доступных городов для сравнения.</span>';
        return;
    }

    // ТВОЯ АКТУАЛЬНАЯ ССЫЛКА ИЗ GOOGLE APPS SCRIPT (ЗАМЕНИ НА СВОЙ /EXEC ЕСЛИ ОН ИЗМЕНИЛСЯ)
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwnQJ47haye9Gz9eIWqqAzleNC9mtqmLm4K6_9S6WxGLYyT7d8bibIRQn9Lt3c_lPQk/exec';

    fetch(GAS_URL, {
        method: 'POST',
        mode: 'cors',
        body: JSON.stringify({
            action: 'findNearest',
            targetPlace: inputPlace,
            foundCities: foundCities
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            let timeString = data.clientTime ? ` местное время ${data.clientTime}` : '';
            resultDiv.innerHTML = `💡 Ближайшая точка: <span style="color: #2980b9;">${data.city}</span> (~${data.distance} км от ${inputPlace}${timeString})`;
        } else {
            resultDiv.innerHTML = `<span style="color: #e74c3c;">❌ ${data.error}</span>`;
        }
    })
    .catch(err => {
        resultDiv.innerHTML = `<span style="color: #e74c3c;">❌ Ошибка соединения со скриптом: ${err.message}</span>`;
    });
}

function clearServerCache(event) {
    event.preventDefault();
    const panel = document.getElementById('cache-panel');
    if (!panel) return;
    
    const originalHTML = panel.innerHTML;
    
    // Временный текст во время загрузки
    panel.innerHTML = '<span>⏳ Обновление базы данных городов...</span>';

    // ССЫЛКА ИЗ GOOGLE APPS SCRIPT
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwnQJ47haye9Gz9eIWqqAzleNC9mtqmLm4K6_9S6WxGLYyT7d8bibIRQn9Lt3c_lPQk/exec';

    fetch(GAS_URL, {
        method: 'POST',
        mode: 'cors',
        body: JSON.stringify({ action: 'clearCache' })
    })
    .then(response => response.json())
    .then(result => {
        if (result.success) {
            panel.innerHTML = '<span>✅ База успешно обновлена! Кэш сброшен.</span>';
            // Через 4 секунды возвращаем прежний вид ссылки
            setTimeout(() => { panel.innerHTML = originalHTML; }, 4000);
        } else {
            alert('Не удалось сбросить кэш: ' + result.error);
            panel.innerHTML = originalHTML;
        }
    })
    .catch(err => {
        alert('Ошибка сети при сбросе кэша: ' + err.message);
        panel.innerHTML = originalHTML;
    });
}

// Полный сброс формы логистики
function clearAll() {
    document.getElementById('lists-container').innerHTML = `
        <div class="list-area"><label>Список 1</label><textarea class="city-input" placeholder="Вставьте первый список строк..."></textarea></div>
        <div class="list-area"><label>Список 2</label><textarea class="city-input" placeholder="Вставьте второй список строк..."></textarea></div>
    `;
    listCount = 2;
    document.getElementById('results').style.display = 'none';
    const targetCityInput = document.getElementById('target-city');
    const nearestResultDiv = document.getElementById('nearest-result');
    if (targetCityInput) targetCityInput.value = '';
    if (nearestResultDiv) nearestResultDiv.innerHTML = '';
}

</script>
</body>
</html>
