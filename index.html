<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инструмент поиска пересечений</title>
    <style>
        /* Глобальные настройки и фон со скриншота */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #bfe3f7 0%, #a1cbe7 50%, #83b3d8 100%);
            min-height: screen;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            color: #333333;
            transition: background 0.3s;
        }

        /* Белая центральная карточка-контейнер */
        .app-card {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 800px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 30px;
        }

        /* Заголовок с иконкой */
        .app-title {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #1e3a5f;
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
                /* Верхняя панель переключателей режима */
        .top-navbar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            background: #f1f5f9;
            padding: 6px;
            border-radius: 10px;
            margin-bottom: 24px;
        }

        .nav-btn {
            flex: 1;
            border: none;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
            color: #64748b;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        /* Активная кнопка синего цвета со скриншота */
        .nav-btn.active {
            background: #3b82f6;
            color: #ffffff;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }

        /* Блок полей ввода списков */
        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .input-textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 13px;
            color: #334155;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-textarea:focus {
            border-color: #3b82f6;
        }

        /* Кнопка "Добавить список" во всю ширину */
        .btn-add {
            width: 100%;
            background: #22c55e;
            color: white;
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 6px rgba(34, 197, 94, 0.2);
        }

        /* Нижние основные кнопки */
        .actions-panel {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-main {
            flex: 1;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            text-align: center;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-secondary {
            background: #94a3b8;
            color: white;
        }

        /* Нижняя панель статуса базы */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #64748b;
            border-top: 1px solid #f1f5f9;
            padding-top: 16px;
        }

        .status-active {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #16a34a;
            font-weight: 500;
        }

    </style>
</head>

<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen">

    <div class="max-w-4xl mx-auto p-4 sm:p-6">
        
        <!-- 🎛️ ЭЛЕМЕНТЫ УПРАВЛЕНИЯ (ВЕРХНЯЯ ПАНЕЛЬ) -->
        <header class="flex flex-col sm:flex-row justify-between items-center gap-4 bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm mb-6">
            
            <!-- Переключатели режима поиска -->
            <div class="flex bg-gray-100 dark:bg-gray-700 p-1 rounded-lg w-full sm:w-auto">
                <button id="btn-search-city" onclick="setSearchMode('city')" class="flex-1 sm:flex-initial text-center px-4 py-2 text-sm font-medium rounded-md transition-all cursor-pointer bg-white dark:bg-gray-600 shadow-sm text-blue-600 dark:text-white">
                    🏙️ Погородно
                </button>
                <button id="btn-search-code" onclick="setSearchMode('code')" class="flex-1 sm:flex-initial text-center px-4 py-2 text-sm font-medium rounded-md transition-all cursor-pointer text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200">
                    🪪 По коду
                </button>
            </div>

            <!-- Переключатель Светлой/Темной темы -->
            <button onclick="toggleTheme()" class="w-full sm:w-auto flex items-center justify-center gap-2 px-4 py-2 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-lg text-sm font-medium transition-all cursor-pointer">
                <span id="theme-icon">🌙</span> 
                <span id="theme-text">Темная тема</span>
            </button>
            
        </header>

        <!-- ⏳ ШАГ 1. ВВОД ДАННЫХ И ЗАПУСК ПОИСКА -->
        <main id="main-content">
            <section class="bg-white dark:bg-gray-800 p-4 sm:p-6 rounded-xl shadow-sm mb-6">
                
                <!-- Контейнер для списков -->
                <div id="lists-container" class="space-y-4 mb-4">
                    
                    <!-- Список 1 -->
                    <div class="list-wrapper">
                        <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Список 1</label>
                        <textarea id="list-1" class="shop-list-input w-full h-32 p-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono resize-y" placeholder="Вставьте сюда логи магазинов (например: 23 Братск2 3...)"></textarea>
                    </div>

                    <!-- Список 2 -->
                    <div class="list-wrapper">
                        <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Список 2</label>
                        <textarea id="list-2" class="shop-list-input w-full h-32 p-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono resize-y" placeholder="Оставьте пустым для быстрого вывода городов или вставьте второй список для поиска пересечений..."></textarea>
                    </div>

                </div>

                <!-- Панель действий с кнопками -->
                <div class="flex flex-col sm:flex-row gap-3 mt-6">
                    <button onclick="startSearch()" class="flex-[2] bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-6 rounded-lg transition-all cursor-pointer shadow-sm text-center">
                        Найти совпадения
                    </button>
                    
                    <button onclick="addNewList()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 px-4 rounded-lg transition-all cursor-pointer shadow-sm text-center flex items-center justify-center gap-1">
                        <span>➕</span> Добавить список
                    </button>

                    <button onclick="resetAllForm()" class="flex-1 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 font-medium py-3 px-4 rounded-lg transition-all cursor-pointer text-center">
                        Сбросить всё
                    </button>
                </div>

            </section>
            
            <!-- Сюда в следующих частях мы добавим блок результатов -->
            <div id="results-section" class="hidden">
                <!-- Место для Блока Результатов -->
            </div>
        </main>

    </div>

    <!-- ЛОГИКА УПРАВЛЕНИЯ -->
    <script>
        let currentSearchMode = 'city';
        let listCount = 2;

        // Переключение режимов поиска
        function setSearchMode(mode) {
            currentSearchMode = mode;
            const btnCity = document.getElementById('btn-search-city');
            const btnCode = document.getElementById('btn-search-code');
            
            if (mode === 'city') {
                btnCity.className = "flex-1 sm:flex-initial text-center px-4 py-2 text-sm font-medium rounded-md transition-all cursor-pointer bg-white dark:bg-gray-600 shadow-sm text-blue-600 dark:text-white";
                btnCode.className = "flex-1 sm:flex-initial text-center px-4 py-2 text-sm font-medium rounded-md transition-all cursor-pointer text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200";
            } else {
                btnCode.className = "flex-1 sm:flex-initial text-center px-4 py-2 text-sm font-medium rounded-md transition-all cursor-pointer bg-white dark:bg-gray-600 shadow-sm text-blue-600 dark:text-white";
                btnCity.className = "flex-1 sm:flex-initial text-center px-4 py-2 text-sm font-medium rounded-md transition-all cursor-pointer text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200";
            }
        }

        // Управление темой
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.innerText = '🌙';
                text.innerText = 'Темная тема';
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                icon.innerText = '☀️';
                text.innerText = 'Светлая тема';
                localStorage.setItem('theme', 'dark');
            }
        }

        // Динамическое добавление списка
        function addNewList() {
            listCount++;
            const container = document.getElementById('lists-container');
            const newListDiv = document.createElement('div');
            newListDiv.className = "list-wrapper dynamic-list";
            newListDiv.id = `wrapper-list-${listCount}`;
            
            newListDiv.innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300">Список ${listCount}</label>
                    <button onclick="removeList(${listCount})" class="text-xs text-red-500 hover:text-red-600 cursor-pointer font-medium">Удалить</button>
                </div>
                <textarea id="list-${listCount}" class="shop-list-input w-full h-32 p-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono resize-y" placeholder="Вставьте данные для списка ${listCount}..."></textarea>
            `;
            container.appendChild(newListDiv);
        }

        function removeList(id) {
            const listToRemove = document.getElementById(`wrapper-list-${id}`);
            if (listToRemove) listToRemove.remove();
        }

        // Полный сброс формы
        function resetAllForm() {
            const dynamicLists = document.querySelectorAll('.dynamic-list');
            dynamicLists.forEach(list => list.remove());
            listCount = 2;
            document.getElementById('list-1').value = '';
            document.getElementById('list-2').value = '';
            const resultsSection = document.getElementById('results-section');
            if (resultsSection) resultsSection.classList.add('hidden');
            document.getElementById('list-1').focus();
        }

        function startSearch() {
            console.log("Поиск запущен...");
        }

        // Инициализация темы
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('theme-icon').innerText = '☀️';
            document.getElementById('theme-text').innerText = 'Светлая тема';
        }
    </script>
</body>
</html>
