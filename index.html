<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инструмент поиска пересечений</title>
    <style>
        /* Глобальные настройки и фон со скриншота */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #bfe3f7 0%, #a1cbe7 50%, #83b3d8 100%);
            min-height: screen;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            color: #333333;
            transition: background 0.3s;
        }

        /* Белая центральная карточка-контейнер */
        .app-card {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 800px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 30px;
        }

        /* Заголовок с иконкой */
        .app-title {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #1e3a5f;
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
                /* Верхняя панель переключателей режима */
        .top-navbar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            background: #f1f5f9;
            padding: 6px;
            border-radius: 10px;
            margin-bottom: 24px;
        }

        .nav-btn {
            flex: 1;
            border: none;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
            color: #64748b;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        /* Активная кнопка синего цвета со скриншота */
        .nav-btn.active {
            background: #3b82f6;
            color: #ffffff;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }

        /* Блок полей ввода списков */
        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .input-textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 13px;
            color: #334155;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-textarea:focus {
            border-color: #3b82f6;
        }

        /* Кнопка "Добавить список" во всю ширину */
        .btn-add {
            width: 100%;
            background: #22c55e;
            color: white;
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 6px rgba(34, 197, 94, 0.2);
        }

        /* Нижние основные кнопки */
        .actions-panel {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-main {
            flex: 1;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            text-align: center;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-secondary {
            background: #94a3b8;
            color: white;
        }

        /* Нижняя панель статуса базы */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #64748b;
            border-top: 1px solid #f1f5f9;
            padding-top: 16px;
        }

        .status-active {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #16a34a;
            font-weight: 500;
        }
        /* Стили для темной темы */
        body.dark-mode { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        body.dark-mode .app-card { background: #1e293b; color: #f8fafc; }
        body.dark-mode .app-title { color: #3b82f6; }
        body.dark-mode .input-label { color: #cbd5e1; }
        body.dark-mode .input-textarea { background: #334155; border-color: #475569; color: #f8fafc; }
        body.dark-mode .top-navbar { background: #334155; }
        body.dark-mode .nav-btn { color: #94a3b8; }

        /* Кнопка удаления для динамических списков */
        .btn-delete {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 12px;
            cursor: pointer;
            font-weight: 500;
        }
        .flex-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        /* Контейнер результатов */
        .results-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            margin-top: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        body.dark-mode .results-card {
            background: #334155;
            border-color: #475569;
        }

        /* Строка результата (Город слева — Кнопки справа) */
        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
            gap: 16px;
        }
        body.dark-mode .result-row { border-bottom-color: #475569; }
        .result-row:last-child { border-bottom: none; }

        .result-city {
            font-weight: 600;
            font-size: 14px;
            color: #1e293b;
        }
        body.dark-mode .result-city { color: #f8fafc; }

        .badges-container {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* Интерактивные кнопки-бейджи магазинов ТОП-3 */
        .store-badge {
            background: #eff6ff;
            color: #2563eb;
            border: 1px solid #bfdbfe;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .store-badge:hover {
            background: #3b82f6;
            color: white;
            transform: translateY(-1px);
        }
        body.dark-mode .store-badge {
            background: #1e293b;
            color: #60a5fa;
            border-color: #3b82f6;
        }

        /* Блок Гео-поиска (Шаг 3) */
        .geo-block {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #e2e8f0;
        }
        body.dark-mode .geo-block { border-top-color: #475569; }

        .geo-input-wrapper {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-orange {
            background: #ea580c;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-orange:hover { background: #c2410c; }

        /* Всплывающее окно (Модалка карточки магазина Шаг 2.1) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 14px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            position: relative;
        }
        body.dark-mode .modal-content { background: #1e293b; color: white; }

        .modal-close {
            position: absolute;
            top: 12px; right: 14px;
            background: none; border: none;
            font-size: 20px; cursor: pointer; color: #94a3b8;
        }

        .modal-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
            padding: 10px 12px;
            border-radius: 8px;
            margin-top: 8px;
            font-size: 13px;
        }
        body.dark-mode .modal-row { background: #334155; }
        
        .btn-copy {
            background: none; border: none; cursor: pointer; font-size: 14px;
        }

    </style>
</head>
<body>

    <!-- Главная белая карточка приложения -->
    <div class="app-card">
        
        <!-- Заголовок сайта -->
        <h1 class="app-title">📍 Инструмент поиска пересечений и ближайшего города</h1>
        
        <!-- 🎛️ Верхняя панель управления -->
        <div class="top-navbar">
            <button id="btn-search-city" onclick="setSearchMode('city')" class="nav-btn active">
                🏙️ Поиск по городам
            </button>
            <button id="btn-search-code" onclick="setSearchMode('code')" class="nav-btn">
                🪪 Поиск по коду магазина
            </button>
            <button onclick="toggleTheme()" class="nav-btn">
                🌙 Темная тема
            </button>
        </div>

        <!-- ⏳ Блок ввода списков -->
        <div id="lists-container">
            
            <!-- Список 1 -->
            <div class="input-group">
                <label class="input-label">Список 1</label>
                <textarea id="list-1" class="input-textarea" placeholder="Вставьте первый список строк..."></textarea>
            </div>

            <!-- Список 2 -->
            <div class="input-group">
                <label class="input-label">Список 2</label>
                <textarea id="list-2" class="input-textarea" placeholder="Вставьте второй список строк..."></textarea>
            </div>

        </div>

        <!-- Зелёная кнопка добавления нового списка -->
        <button onclick="addNewList()" class="btn-add">
            ➕ Добавить список
        </button>

        <!-- Основные кнопки действий -->
        <div class="actions-panel">
            <button onclick="startSearch()" class="btn-main btn-primary">
                Найти совпадения
            </button>
            <button onclick="resetAllForm()" class="btn-main btn-secondary">
                Сбросить всё
            </button>
        </div>
                <!-- БЛОК РЕЗУЛЬТАТОВ (Появляется после нажатия "Найти совпадения") -->
        <div id="results-section" style="display: none;">
            <div class="results-card">
                <h3 class="input-label" style="color: #1e3a5f;">📊 Результаты анализа и пересечений (ТОП-3 остатки):</h3>
                
                <!-- Сюда JavaScript будет вставлять строки с городами и кнопками-бейджами -->
                <div id="results-rows-container"></div>

                <!-- 📍 НАЙТИ БЛИЖАЙШИЙ ИЗ НАЙДЕННЫХ (Шаг 3) -->
                <div class="geo-block">
                    <label class="input-label">📍 Найти ближайший из найденных</label>
                    <div class="geo-input-wrapper">
                        <input type="text" id="geo-search-input" class="input-textarea" style="height: 42px; margin-bottom: 0;" placeholder="Введите город, село, деревню или СНТ клиента...">
                        <button onclick="findNearestStore()" class="btn-orange">Найти ближайший</button>
                    </div>
                    <!-- Место для вывода текста с результатом гео-поиска -->
                    <div id="geo-result-output" style="margin-top: 12px; font-size: 13px; font-weight: 500;"></div>
                </div>
            </div>
        </div>

    </div> <!-- Конец .app-card -->

    <!-- ВСПЛЫВАЮЩЕЕ ОКНО: КАРТОЧКА МАГАЗИНА (Шаг 2.1) -->
    <div id="store-modal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal(null)">×</button>
            <h4 id="modal-store-title" style="font-weight: 700; margin-bottom: 16px; color: #3b82f6;">🏪 Карточка магазина</h4>
            
            <div style="margin-bottom: 12px;">
                <span style="font-size: 11px; color: #64748b; font-weight: 600;">ТОЧНЫЙ АДРЕС ОТГРУЗКИ</span>
                <div class="modal-row">
                    <span id="modal-address-text">Загрузка...</span>
                    <button onclick="copyText('modal-address-text', this)" class="btn-copy">📋</button>
                </div>
            </div>

            <div>
                <span style="font-size: 11px; color: #64748b; font-weight: 600;">УНИКАЛЬНЫЙ КОД AXAPTA</span>
                <div class="modal-row">
                    <span id="modal-axapta-text">Загрузка...</span>
                    <button onclick="copyText('modal-axapta-text', this)" class="btn-copy">📋</button>
                </div>
            </div>
        </div>
    </div>
        <!-- Нижня панель статуса -->
        <div class="status-bar">
            <div class="status-active">
                🟢 База городов: активна (изм 6 часов)
            </div>
            <div style="color: #3b82f6; cursor: pointer;" onclick="updateDatabase()">
                🔄 Обновить базу сейчас
            </div>
        </div>

    </div>
    <script>
// ========================================================
// ГЛОБАЛЬНОЕ СОСТОЯНИЕ И НАСТРОЙКИ ПРИЛОЖЕНИЯ
// ========================================================
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwdhMQfdzMI0BUpSxNrKnVhtplN6MOcKdmdfMri07x_aLfFjSNFONmb_KnEzuytEfXg/exec";

let currentSearchMode = 'city'; 
let listCount = 2;              
let storeDatabase = {};         

function loadDatabase() {
    const statusText = document.querySelector('.status-active');
    
    // ТЕПЕРЬ ПРОВЕРКА ПРАВИЛЬНАЯ: проверяем только на пустоту или на дефолтный текст
    if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("ЗДЕСЬ_ВАША_ССЫЛКА")) {
        statusText.innerHTML = "🔴 Ошибка: Пропишите ссылку на Google Скрипт";
        return;
    }
    
    statusText.innerHTML = "⏳ Загрузка базы данных магазинов...";
    
    fetch(GOOGLE_SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                statusText.innerHTML = "🔴 Ошибка базы: " + data.error;
            } else {
                storeDatabase = data;
                statusText.innerHTML = `🟢 База городов: активна (${Object.keys(data).length} маг.)`;
            }
        })
        .catch(err => {
            statusText.innerHTML = "🔴 Нет связи с Google Таблицей";
            console.error(err);
        });
}

    statusText.innerHTML = "⏳ Загрузка базы данных магазинов...";
    
    fetch(GOOGLE_SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                statusText.innerHTML = "🔴 Ошибка базы: " + data.error;
            } else {
                storeDatabase = data;
                statusText.innerHTML = `🟢 База городов: активна (${Object.keys(data).length} маг.)`;
            }
        })
        .catch(err => {
            statusText.innerHTML = "🔴 Нет связи с Google Таблицей";
        });
}

function updateDatabase() { loadDatabase(); }

function setSearchMode(mode) {
    currentSearchMode = mode;
    const btnCity = document.getElementById('btn-search-city');
    const btnCode = document.getElementById('btn-search-code');
    if (mode === 'city') {
        btnCity.classList.add('active');
        btnCode.classList.remove('active');
    } else {
        btnCode.classList.add('active');
        btnCity.classList.remove('active');
    }
}

function toggleTheme() {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('app-theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
}

function addNewList() {
    listCount++;
    const container = document.getElementById('lists-container');
    const newGroup = document.createElement('div');
    newGroup.className = 'input-group';
    newGroup.id = `group-list-${listCount}`;
    newGroup.innerHTML = `
        <div class="flex-header">
            <label class="input-label">Список ${listCount}</label>
            <button type="button" onclick="removeList(${listCount})" class="btn-delete">Удалить</button>
        </div>
        <textarea id="list-${listCount}" class="input-textarea" placeholder="Вставьте данные для списка ${listCount}..."></textarea>
    `;
    container.appendChild(newGroup);
}

function removeList(id) {
    const el = document.getElementById(`group-list-${id}`);
    if (el) el.remove();
}

function calculateDistance(lat1, lng1, lat2, lng2) {
    const R = 6371; 
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
              Math.sin(dLng / 2) * Math.sin(dLng / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
}

function parseDirtyList(text) {
    const lines = text.split('\n');
    const storesMap = new Map();
    for (let i = 0; i < lines.length; i++) {
        let line = lines[i].trim();
        if (!line) continue;
        const strictMatch = line.match(/^\d+\s+([A-Za-zА-Яа-я0-9_#-]+)\s+(\d+)$/);
        if (strictMatch) {
            const code = strictMatch[1].trim();
            const stock = parseInt(strictMatch[2], 10);
            if (/^\d+$/.test(code) && code.length <= 3) continue; 
            storesMap.set(code, stock);
            continue;
        }
        if (line.includes(',') || line.includes('ул.') || line.includes('г.') || line.includes('обл.')) continue; 
        const words = line.split(/\s+/);
        if (words.length >= 3) {
            const firstWordNum = parseInt(words[0], 10);
            const lastWordNum = parseInt(words[words.length - 1], 10);
            const middleWord = words[1].replace(/[,.]/g, '').trim();
            if (!isNaN(firstWordNum) && !isNaN(lastWordNum) && middleWord.length > 2 && isNaN(parseInt(middleWord, 10))) {
                storesMap.set(middleWord, lastWordNum);
            }
        }
    }
    return storesMap;
}
// Главная функция запуска вычислений при нажатии синей кнопки
function startSearch() {
    const activeLists = [];
    for (let i = 1; i <= 100; i++) {
        const textarea = document.getElementById(`list-${i}`);
        if (textarea && textarea.value.trim()) {
            activeLists.push(parseDirtyList(textarea.value));
        }
    }

    if (activeLists.length === 0) {
        alert("Пожалуйста, заполните хотя бы Список 1");
        return;
    }

    let finalStores = [];
    if (activeLists.length === 1) {
        activeLists[0].forEach((stock, code) => {
            finalStores.push({ code, stock });
        });
    } else {
        const firstMap = activeLists[0];
        firstMap.forEach((stockInFirst, code) => {
            let isInAll = true;
            let minStock = stockInFirst;

            for (let j = 1; j < activeLists.length; j++) {
                if (!activeLists[j].has(code)) {
                    isInAll = false;
                    break;
                } else {
                    minStock = Math.min(minStock, activeLists[j].get(code));
                }
            }
            if (isInAll) finalStores.push({ code, stock: minStock });
        });
    }
    renderResults(finalStores);
}

// Группировка по городам, сортировка и вывод ТОП-3
function renderResults(storesArray) {
    const container = document.getElementById('results-rows-container');
    container.innerHTML = ''; 

    if (storesArray.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:20px; color:#64748b; font-size:13px;">Совпадений не найдено 🤷‍♂️</div>`;
        document.getElementById('results-section').style.display = 'block';
        return;
    }

    const groupedByCity = {};
    storesArray.forEach(item => {
        const dbItem = storeDatabase[item.code];
        let groupKey = "Неизвестный код";
        if (dbItem) {
            groupKey = (currentSearchMode === 'city') ? dbItem.city : item.code;
        }
        if (!groupedByCity[groupKey]) groupedByCity[groupKey] = [];
        groupedByCity[groupKey].push(item);
    });

    Object.keys(groupedByCity).forEach(city => {
        const row = document.createElement('div');
        row.className = 'result-row';

        const sortedStores = groupedByCity[city].sort((a, b) => b.stock - a.stock);
        const top3Stores = sortedStores.slice(0, 3);

        let badgesHtml = '';
        top3Stores.forEach(store => {
            badgesHtml += `<button class="store-badge" onclick="openStoreCard('${store.code}')">${store.code} (${store.stock} шт)</button>`;
        });

        row.innerHTML = `<div class="result-city">${city}</div><div class="badges-container">${badgesHtml}</div>`;
        container.appendChild(row);
    });
    document.getElementById('results-section').style.display = 'block';
}

// Карточка магазина и копирование
function openStoreCard(storeCode) {
    const modal = document.getElementById('store-modal');
    document.getElementById('modal-store-title').innerText = `🏪 Карточка магазина: ${storeCode}`;
    
    const dbItem = storeDatabase[storeCode];
    if (dbItem) {
        document.getElementById('modal-address-text').innerText = dbItem.address || "Адрес не указан в Google таблице";
        document.getElementById('modal-axapta-text').innerText = storeCode;
    } else {
        document.getElementById('modal-address-text').innerText = "Данные о магазине отсутствуют в базе";
        document.getElementById('modal-axapta-text').innerText = storeCode;
    }
    modal.classList.add('open');
}

function closeModal(event) {
    if (event === null || event.target === document.getElementById('store-modal')) {
        document.getElementById('store-modal').classList.remove('open');
    }
}

function copyText(elementId, buttonElement) {
    const text = document.getElementById(elementId).innerText;
    navigator.clipboard.writeText(text).then(() => {
        const oldIcon = buttonElement.innerHTML;
        buttonElement.innerHTML = '✅';
        buttonElement.style.pointerEvents = 'none';
        setTimeout(() => {
            buttonElement.innerHTML = oldIcon;
            buttonElement.style.pointerEvents = 'auto';
        }, 1000);
    });
}

// Динамический гео-поиск координат через бэкенд
async function fetchCoordinates(address) {
    const url = `${GOOGLE_SCRIPT_URL}?geoQuery=${encodeURIComponent(address)}`;
    const res = await fetch(url);
    const response = await res.json();
    return response.success ? response.data : null;
}

// Полностью автоматический поиск по всей России
async function findNearestStore() {
    const userInput = document.getElementById('geo-search-input').value.trim();
    const output = document.getElementById('geo-result-output');
    
    if (!userInput) { alert("Введите адрес доставки клиента"); return; }

    const cityElements = document.querySelectorAll('.result-city');
    const citiesOnScreen = [];
    cityElements.forEach(el => {
        const name = el.innerText.trim();
        if (!citiesOnScreen.includes(name)) citiesOnScreen.push(name);
    });

    if (citiesOnScreen.length === 0) {
        output.style.color = '#ef4444';
        output.innerHTML = "⚠️ Сначала вставьте списки и найдите совпадения магазинов.";
        return;
    }

    output.style.color = '#64748b';
    output.innerHTML = `⏳ Спутник ищет координаты клиента и доступных городов...`;

    try {
        const clientCoords = await fetchCoordinates(userInput);
        if (!clientCoords) {
            output.style.color = '#ef4444';
            output.innerHTML = "❌ Google Maps не смог найти адрес клиента. Уточните область или район.";
            return;
        }

        let minDistance = Infinity;
        let nearestCity = "";

        for (let cityName of citiesOnScreen) {
            const cleanCityName = cityName.replace(/\(.*?\)/g, '').trim();
            const cityCoords = await fetchCoordinates(cleanCityName);
            
            if (cityCoords) {
                const dist = calculateDistance(clientCoords.lat, clientCoords.lng, cityCoords.lat, cityCoords.lng);
                if (dist < minDistance) {
                    minDistance = dist;
                    nearestCity = cityName;
                }
            }
        }

        if (nearestCity) {
            const tz = clientCoords.tz || 3; 
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const localTimeOfCity = new Date(utc + (3600000 * tz));
            
            const hours = String(localTimeOfCity.getHours()).padStart(2, '0');
            const minutes = String(localTimeOfCity.getMinutes()).padStart(2, '0');

            output.style.color = '#ea580c';
            output.innerHTML = `💡 Ближайшая точка: <strong>${nearestCity}</strong> (~${Math.round(minDistance)} км от ${userInput}, местное время склада <strong>${hours}:${minutes}</strong>)`;
        } else {
            output.style.color = '#ef4444';
            output.innerHTML = "⚠️ Не удалось рассчитать расстояния до городов.";
        }

    } catch (err) {
        output.style.color = '#ef4444';
        output.innerHTML = "❌ Ошибка при динамическом расчете геоданных.";
        console.error(err);
    }
}

// Очистка формы
function resetAllForm() {
    const dynamicLists = document.querySelectorAll('.input-group');
    dynamicLists.forEach((list, index) => { if (index >= 2) list.remove(); });
    listCount = 2;
    document.getElementById('list-1').value = '';
    document.getElementById('list-2').value = '';
    document.getElementById('geo-search-input').value = '';
    document.getElementById('geo-result-output').innerHTML = '';
    document.getElementById('results-section').style.display = 'none';
    document.getElementById('list-1').focus();
}
