<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инструмент поиска пересечений</title>
    <style>
        /* Глобальные настройки и фон со скриншота */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #bfe3f7 0%, #a1cbe7 50%, #83b3d8 100%);
            min-height: screen;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            color: #333333;
            transition: background 0.3s;
        }

        /* Белая центральная карточка-контейнер */
        .app-card {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 800px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 30px;
        }

        /* Заголовок с иконкой */
        .app-title {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #1e3a5f;
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
                /* Верхняя панель переключателей режима */
        .top-navbar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            background: #f1f5f9;
            padding: 6px;
            border-radius: 10px;
            margin-bottom: 24px;
        }

        .nav-btn {
            flex: 1;
            border: none;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
            color: #64748b;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        /* Активная кнопка синего цвета со скриншота */
        .nav-btn.active {
            background: #3b82f6;
            color: #ffffff;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }

        /* Блок полей ввода списков */
        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .input-textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 13px;
            color: #334155;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-textarea:focus {
            border-color: #3b82f6;
        }

        /* Кнопка "Добавить список" во всю ширину */
        .btn-add {
            width: 100%;
            background: #22c55e;
            color: white;
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 6px rgba(34, 197, 94, 0.2);
        }

        /* Нижние основные кнопки */
        .actions-panel {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-main {
            flex: 1;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            text-align: center;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-secondary {
            background: #94a3b8;
            color: white;
        }

        /* Нижняя панель статуса базы */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #64748b;
            border-top: 1px solid #f1f5f9;
            padding-top: 16px;
        }

        .status-active {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #16a34a;
            font-weight: 500;
        }
        /* Стили для темной темы */
        body.dark-mode { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        body.dark-mode .app-card { background: #1e293b; color: #f8fafc; }
        body.dark-mode .app-title { color: #3b82f6; }
        body.dark-mode .input-label { color: #cbd5e1; }
        body.dark-mode .input-textarea { background: #334155; border-color: #475569; color: #f8fafc; }
        body.dark-mode .top-navbar { background: #334155; }
        body.dark-mode .nav-btn { color: #94a3b8; }

        /* Кнопка удаления для динамических списков */
        .btn-delete {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 12px;
            cursor: pointer;
            font-weight: 500;
        }
        .flex-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

    </style>
</head>
<body>

    <!-- Главная белая карточка приложения -->
    <div class="app-card">
        
        <!-- Заголовок сайта -->
        <h1 class="app-title">📍 Инструмент поиска пересечений и ближайшего города</h1>
        
        <!-- 🎛️ Верхняя панель управления -->
        <div class="top-navbar">
            <button id="btn-search-city" onclick="setSearchMode('city')" class="nav-btn active">
                🏙️ Поиск по городам
            </button>
            <button id="btn-search-code" onclick="setSearchMode('code')" class="nav-btn">
                🪪 Поиск по коду магазина
            </button>
            <button onclick="toggleTheme()" class="nav-btn">
                🌙 Темная тема
            </button>
        </div>

        <!-- ⏳ Блок ввода списков -->
        <div id="lists-container">
            
            <!-- Список 1 -->
            <div class="input-group">
                <label class="input-label">Список 1</label>
                <textarea id="list-1" class="input-textarea" placeholder="Вставьте первый список строк..."></textarea>
            </div>

            <!-- Список 2 -->
            <div class="input-group">
                <label class="input-label">Список 2</label>
                <textarea id="list-2" class="input-textarea" placeholder="Вставьте второй список строк..."></textarea>
            </div>

        </div>

        <!-- Зелёная кнопка добавления нового списка -->
        <button onclick="addNewList()" class="btn-add">
            ➕ Добавить список
        </button>

        <!-- Основные кнопки действий -->
        <div class="actions-panel">
            <button onclick="startSearch()" class="btn-main btn-primary">
                Найти совпадения
            </button>
            <button onclick="resetAllForm()" class="btn-main btn-secondary">
                Сбросить всё
            </button>
        </div>

        <!-- Нижня панель статуса -->
        <div class="status-bar">
            <div class="status-active">
                🟢 База городов: активна (изм 6 часов)
            </div>
            <div style="color: #3b82f6; cursor: pointer;" onclick="updateDatabase()">
                🔄 Обновить базу сейчас
            </div>
        </div>

    </div>
    <script>
        // Переменные состояния приложения
        let currentSearchMode = 'city'; // 'city' или 'code'
        let listCount = 2; // Начальное количество списков
        let storeDatabase = {}; // Сюда запишем данные из Google Таблицы

        // Вставьте сюда вашу ссылку из Google Apps Script (Шаг 1)
        const GOOGLE_SCRIPT_URL = "ЗДЕСЬ_ВАША_ССЫЛКА_ИЗ_GOOGLE";

        // 1. Переключение режимов поиска (Погородно / По коду)
        function setSearchMode(mode) {
            currentSearchMode = mode;
            const btnCity = document.getElementById('btn-search-city');
            const btnCode = document.getElementById('btn-search-code');
            
            if (mode === 'city') {
                btnCity.classList.add('active');
                btnCode.classList.remove('active');
            } else {
                btnCode.classList.add('active');
                btnCity.classList.remove('active');
            }
            console.log("Режим изменен на:", currentSearchMode);
        }

        // 2. Переключение Темной / Светлой темы
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('app-theme', isDark ? 'dark' : 'light');
        }

        // Проверка темы при загрузке страницы
        if (localStorage.getItem('app-theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        // 3. Динамическое добавление новых списков (Кнопка +)
        function addNewList() {
            listCount++;
            const container = document.getElementById('lists-container');
            
            const newGroup = document.createElement('div');
            newGroup.className = 'input-group';
            newGroup.id = `group-list-${listCount}`;
            
            newGroup.innerHTML = `
                <div class="flex-header">
                    <label class="input-label">Список ${listCount}</label>
                    <button type="button" onclick="removeList(${listCount})" class="btn-delete">Удалить</button>
                </div>
                <textarea id="list-${listCount}" class="input-textarea" placeholder="Вставьте данные для списка ${listCount}..."></textarea>
            `;
            container.appendChild(newGroup);
        }

        // Удаление динамического списка
        function removeList(id) {
            const el = document.getElementById(`group-list-${id}`);
            if (el) el.remove();
        }

        // 4. Очистка формы (Шаг 4 инструкции)
        function resetAllForm() {
            // Удаляем все списки начиная с 3-го
            for (let i = 3; i <= listCount; i++) {
                removeList(i);
            }
            listCount = 2;
            
            // Зачищаем базовые поля
            document.getElementById('list-1').value = '';
            document.getElementById('list-2').value = '';
            
            console.log("Форма сброшена к исходному состоянию");
        }

        // Функция-заглушка для обновления базы данных
        function updateDatabase() {
            alert("Запрос к Google Таблице отправлен...");
        }

        // Функция-заглушка для старта поиска
        function startSearch() {
            alert("Запуск обработки списков...");
        }
    </script>

</body>
</html>
